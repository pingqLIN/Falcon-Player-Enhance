<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Popup Player Verification</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #111827;
        color: #e5e7eb;
        font-family: Arial, sans-serif;
      }

      .stage {
        width: 960px;
        height: 540px;
        margin: 24px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: #000;
      }

      iframe {
        display: block;
        width: 960px;
        height: 540px;
        border: 0;
        background: #000;
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="verification player shell">
      <iframe
        title="verification-player"
        srcdoc='<!doctype html><html lang="en"><head><meta charset="utf-8" /><style>html,body{margin:0;width:100%;height:100%;background:#0f172a;color:#f8fafc;font-family:Arial,sans-serif}body{display:flex;align-items:center;justify-content:center;font-size:28px;letter-spacing:.04em}</style></head><body>Player Ready</body></html>'
      ></iframe>
    </main>
  </body>
</html>
