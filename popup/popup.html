<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shield Pro</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-icon">🛡️</span>
                <h1>Shield Pro</h1>
            </div>
            <div class="status-badge" id="protection-status">
                <span class="status-dot active"></span>
                <span>防護中</span>
            </div>
        </header>

        <main>
            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-value" id="ads-blocked">0</span>
                    <span class="stat-label">已攔截廣告</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value" id="trackers-blocked">0</span>
                    <span class="stat-label">已阻擋追蹤</span>
                </div>
            </div>

            <div class="player-info" id="player-status-container">
                <span class="player-icon">🎬</span>
                <span id="player-count-text">偵測到 0 個播放器</span>
            </div>
        </main>

        <footer>
            <button id="open-dashboard" class="primary-btn">
                <span>開啟控制面板</span>
                <span class="arrow">→</span>
            </button>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
