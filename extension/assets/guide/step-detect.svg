<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="d-body" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#F2F6FA"/>
      <stop offset="80%" stop-color="#D0D8E4"/>
      <stop offset="100%" stop-color="#B8C4D4"/>
    </radialGradient>
    <radialGradient id="d-visor" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#2A3548"/>
      <stop offset="100%" stop-color="#111B2A"/>
    </radialGradient>
    <filter id="d-glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="d-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="d-flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="d-scan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="178" rx="38" ry="6" fill="#000" opacity="0.08"/>

  <!-- Scan beams from eyes -->
  <polygon points="88,98 20,50 20,90" fill="url(#d-scan)" opacity="0.25"/>
  <polygon points="108,98 180,50 180,90" fill="url(#d-scan)" opacity="0.25"/>
  <line x1="78" y1="95" x2="24" y2="62" stroke="#00E5FF" stroke-width="0.8" opacity="0.4"/>
  <line x1="78" y1="102" x2="24" y2="86" stroke="#00E5FF" stroke-width="0.8" opacity="0.4"/>
  <line x1="122" y1="95" x2="176" y2="62" stroke="#00E5FF" stroke-width="0.8" opacity="0.4"/>
  <line x1="122" y1="102" x2="176" y2="86" stroke="#00E5FF" stroke-width="0.8" opacity="0.4"/>

  <!-- Thruster flames -->
  <ellipse cx="82" cy="155" rx="7" ry="12" fill="url(#d-flame)" opacity="0.65"/>
  <ellipse cx="118" cy="155" rx="7" ry="12" fill="url(#d-flame)" opacity="0.65"/>
  <ellipse cx="82" cy="152" rx="4" ry="7" fill="#FFD54F" opacity="0.8"/>
  <ellipse cx="118" cy="152" rx="4" ry="7" fill="#FFD54F" opacity="0.8"/>

  <!-- Thruster pods -->
  <rect x="74" y="136" width="16" height="14" rx="5" fill="#8A9AB0" stroke="#6B7B90" stroke-width="0.8"/>
  <rect x="110" y="136" width="16" height="14" rx="5" fill="#8A9AB0" stroke="#6B7B90" stroke-width="0.8"/>
  <ellipse cx="82" cy="149" rx="6" ry="2.5" fill="#FF8C00"/>
  <ellipse cx="118" cy="149" rx="6" ry="2.5" fill="#FF8C00"/>

  <!-- Left arm (spread out — scanning pose) -->
  <g filter="url(#d-shadow)">
    <path d="M54 98 Q36 88 26 80" fill="none" stroke="#A0B0C4" stroke-width="7" stroke-linecap="round"/>
    <circle cx="24" cy="78" r="5.5" fill="#FF8C00"/>
  </g>

  <!-- Right arm (spread out — scanning pose) -->
  <g filter="url(#d-shadow)">
    <path d="M146 98 Q164 88 174 80" fill="none" stroke="#A0B0C4" stroke-width="7" stroke-linecap="round"/>
    <circle cx="176" cy="78" r="5.5" fill="#FF8C00"/>
  </g>

  <!-- Body sphere -->
  <g filter="url(#d-shadow)">
    <circle cx="100" cy="104" r="46" fill="url(#d-body)" stroke="#B0BAC8" stroke-width="1.2"/>
  </g>

  <!-- Body accent lines -->
  <path d="M58 115 Q100 138 142 115" fill="none" stroke="#00BCD4" stroke-width="1.2" opacity="0.5"/>
  <path d="M65 125 Q100 142 135 125" fill="none" stroke="#00BCD4" stroke-width="0.8" opacity="0.3"/>

  <!-- Shield icon on body -->
  <g transform="translate(88,115) scale(0.6)" opacity="0.4">
    <path d="M20 4 L4 12 L4 24 Q4 36 20 42 Q36 36 36 24 L36 12 Z" fill="none" stroke="#00BCD4" stroke-width="2.5"/>
    <path d="M14 22 L19 27 L28 16" fill="none" stroke="#00BCD4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Antenna stem -->
  <line x1="100" y1="58" x2="100" y2="38" stroke="#8899AA" stroke-width="3" stroke-linecap="round"/>
  <!-- Antenna ball (pulsing/active) -->
  <circle cx="100" cy="34" r="6" fill="#FF8C00"/>
  <circle cx="100" cy="34" r="10" fill="#FF8C00" opacity="0.15"/>
  <circle cx="98" cy="32" r="2" fill="#FFD54F" opacity="0.6"/>

  <!-- Visor -->
  <rect x="68" y="82" width="64" height="36" rx="18" fill="url(#d-visor)"/>
  <rect x="70" y="84" width="60" height="32" rx="16" fill="none" stroke="#3A5068" stroke-width="0.6" opacity="0.4"/>

  <!-- Eyes (focused/narrow — detecting) -->
  <g filter="url(#d-glow)">
    <rect x="80" y="95" width="12" height="10" rx="3" fill="#00E5FF"/>
    <rect x="108" y="95" width="12" height="10" rx="3" fill="#00E5FF"/>
  </g>
  <!-- Eye highlights -->
  <rect x="82" y="96" width="4" height="4" rx="2" fill="#fff" opacity="0.35"/>
  <rect x="110" y="96" width="4" height="4" rx="2" fill="#fff" opacity="0.35"/>
  <!-- Eyebrows (concentrated look) -->
  <line x1="78" y1="90" x2="92" y2="93" stroke="#00BCD4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="122" y1="90" x2="108" y2="93" stroke="#00BCD4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Scan target markers -->
  <g opacity="0.5">
    <rect x="14" y="56" width="18" height="18" rx="2" fill="none" stroke="#FF3B30" stroke-width="1.5"/>
    <line x1="23" y1="60" x2="23" y2="70" stroke="#FF3B30" stroke-width="1"/>
    <line x1="18" y1="65" x2="28" y2="65" stroke="#FF3B30" stroke-width="1"/>
    <text x="23" y="82" text-anchor="middle" fill="#FF3B30" font-family="system-ui,sans-serif" font-size="7" font-weight="600">AD</text>
  </g>
  <g opacity="0.5">
    <rect x="168" y="56" width="18" height="18" rx="2" fill="none" stroke="#FF3B30" stroke-width="1.5"/>
    <line x1="172" y1="60" x2="172" y2="64" stroke="#FF3B30" stroke-width="1"/>
    <line x1="182" y1="60" x2="182" y2="64" stroke="#FF3B30" stroke-width="1"/>
    <line x1="172" y1="70" x2="182" y2="70" stroke="#FF3B30" stroke-width="1"/>
    <text x="177" y="82" text-anchor="middle" fill="#FF3B30" font-family="system-ui,sans-serif" font-size="7" font-weight="600">×</text>
  </g>

  <!-- Step number badge -->
  <circle cx="28" cy="28" r="16" fill="#333"/>
  <text x="28" y="34" text-anchor="middle" fill="#FFF" font-family="system-ui,sans-serif" font-size="18" font-weight="700">2</text>
</svg>
