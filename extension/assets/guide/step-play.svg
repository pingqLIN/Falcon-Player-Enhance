<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="p-body" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#F2F6FA"/>
      <stop offset="80%" stop-color="#D0D8E4"/>
      <stop offset="100%" stop-color="#B8C4D4"/>
    </radialGradient>
    <radialGradient id="p-visor" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#2A3548"/>
      <stop offset="100%" stop-color="#111B2A"/>
    </radialGradient>
    <filter id="p-glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="p-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="p-flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="178" rx="38" ry="6" fill="#000" opacity="0.08"/>

  <!-- Celebration sparkles -->
  <g opacity="0.7">
    <polygon points="38,24 40,30 46,30 41,34 43,40 38,36 33,40 35,34 30,30 36,30" fill="#FFD54F"/>
    <polygon points="162,30 163.5,34 168,34 164.5,37 165.5,41 162,38 158.5,41 159.5,37 156,34 160.5,34" fill="#00E5FF"/>
    <polygon points="50,52 51,55 54,55 51.8,57 52.5,60 50,58 47.5,60 48.2,57 46,55 49,55" fill="#FF8C00"/>
    <polygon points="154,50 155,53 158,53 155.8,55 156.5,58 154,56 151.5,58 152.2,55 150,53 153,53" fill="#FFD54F"/>
    <circle cx="30" cy="50" r="2" fill="#00BCD4"/>
    <circle cx="170" cy="44" r="2" fill="#FF8C00"/>
    <circle cx="42" cy="70" r="1.5" fill="#FFD54F"/>
    <circle cx="158" cy="68" r="1.5" fill="#00E5FF"/>
  </g>

  <!-- Thruster flames (brighter — celebrating) -->
  <ellipse cx="82" cy="158" rx="8" ry="14" fill="url(#p-flame)" opacity="0.75"/>
  <ellipse cx="118" cy="158" rx="8" ry="14" fill="url(#p-flame)" opacity="0.75"/>
  <ellipse cx="82" cy="154" rx="5" ry="8" fill="#FFD54F" opacity="0.9"/>
  <ellipse cx="118" cy="154" rx="5" ry="8" fill="#FFD54F" opacity="0.9"/>

  <!-- Thruster pods -->
  <rect x="74" y="136" width="16" height="14" rx="5" fill="#8A9AB0" stroke="#6B7B90" stroke-width="0.8"/>
  <rect x="110" y="136" width="16" height="14" rx="5" fill="#8A9AB0" stroke="#6B7B90" stroke-width="0.8"/>
  <ellipse cx="82" cy="149" rx="6" ry="2.5" fill="#FF8C00"/>
  <ellipse cx="118" cy="149" rx="6" ry="2.5" fill="#FF8C00"/>

  <!-- Left arm (raised — celebrating) -->
  <g filter="url(#p-shadow)">
    <path d="M54 96 Q38 72 34 56" fill="none" stroke="#A0B0C4" stroke-width="7" stroke-linecap="round"/>
    <circle cx="33" cy="54" r="5.5" fill="#FF8C00"/>
  </g>

  <!-- Right arm (raised — celebrating) -->
  <g filter="url(#p-shadow)">
    <path d="M146 96 Q162 72 166 56" fill="none" stroke="#A0B0C4" stroke-width="7" stroke-linecap="round"/>
    <circle cx="167" cy="54" r="5.5" fill="#FF8C00"/>
  </g>

  <!-- Body sphere -->
  <g filter="url(#p-shadow)">
    <circle cx="100" cy="104" r="46" fill="url(#p-body)" stroke="#B0BAC8" stroke-width="1.2"/>
  </g>

  <!-- Body accent lines -->
  <path d="M58 115 Q100 138 142 115" fill="none" stroke="#00BCD4" stroke-width="1.2" opacity="0.5"/>
  <path d="M65 125 Q100 142 135 125" fill="none" stroke="#00BCD4" stroke-width="0.8" opacity="0.3"/>

  <!-- Play button on body -->
  <g transform="translate(89,116)" opacity="0.45">
    <circle cx="11" cy="11" r="11" fill="none" stroke="#00BCD4" stroke-width="1.5"/>
    <polygon points="8,5 8,17 18,11" fill="#00BCD4"/>
  </g>

  <!-- Antenna stem -->
  <line x1="100" y1="58" x2="100" y2="38" stroke="#8899AA" stroke-width="3" stroke-linecap="round"/>
  <!-- Antenna ball (happy glow) -->
  <circle cx="100" cy="34" r="6" fill="#FF8C00"/>
  <circle cx="100" cy="34" r="10" fill="#FFD54F" opacity="0.12"/>
  <circle cx="98" cy="32" r="2" fill="#FFD54F" opacity="0.6"/>

  <!-- Visor -->
  <rect x="68" y="82" width="64" height="36" rx="18" fill="url(#p-visor)"/>
  <rect x="70" y="84" width="60" height="32" rx="16" fill="none" stroke="#3A5068" stroke-width="0.6" opacity="0.4"/>

  <!-- Happy eyes (curved smiles ◡◡) -->
  <g filter="url(#p-glow)">
    <path d="M80 100 Q86 92 92 100" fill="none" stroke="#00E5FF" stroke-width="3" stroke-linecap="round"/>
    <path d="M108 100 Q114 92 120 100" fill="none" stroke="#00E5FF" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Blush marks -->
  <ellipse cx="76" cy="104" rx="5" ry="3" fill="#FF8C94" opacity="0.25"/>
  <ellipse cx="124" cy="104" rx="5" ry="3" fill="#FF8C94" opacity="0.25"/>

  <!-- Check mark badge -->
  <g transform="translate(140,70)">
    <circle cx="0" cy="0" r="12" fill="#20C997"/>
    <path d="M-5 0 L-1.5 4 L6 -4" fill="none" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Step number badge -->
  <circle cx="28" cy="28" r="16" fill="#333"/>
  <text x="28" y="34" text-anchor="middle" fill="#FFF" font-family="system-ui,sans-serif" font-size="18" font-weight="700">3</text>
</svg>
