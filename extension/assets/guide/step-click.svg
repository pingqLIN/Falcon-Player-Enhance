<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="c-body" cx="0.4" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#F2F6FA"/>
      <stop offset="80%" stop-color="#D0D8E4"/>
      <stop offset="100%" stop-color="#B8C4D4"/>
    </radialGradient>
    <radialGradient id="c-visor" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#2A3548"/>
      <stop offset="100%" stop-color="#111B2A"/>
    </radialGradient>
    <filter id="c-glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="c-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="c-flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="178" rx="38" ry="6" fill="#000" opacity="0.08"/>

  <!-- Thruster flames -->
  <ellipse cx="82" cy="155" rx="7" ry="12" fill="url(#c-flame)" opacity="0.65"/>
  <ellipse cx="118" cy="155" rx="7" ry="12" fill="url(#c-flame)" opacity="0.65"/>
  <ellipse cx="82" cy="152" rx="4" ry="7" fill="#FFD54F" opacity="0.8"/>
  <ellipse cx="118" cy="152" rx="4" ry="7" fill="#FFD54F" opacity="0.8"/>

  <!-- Thruster pods -->
  <rect x="74" y="136" width="16" height="14" rx="5" fill="#8A9AB0" stroke="#6B7B90" stroke-width="0.8"/>
  <rect x="110" y="136" width="16" height="14" rx="5" fill="#8A9AB0" stroke="#6B7B90" stroke-width="0.8"/>
  <ellipse cx="82" cy="149" rx="6" ry="2.5" fill="#FF8C00"/>
  <ellipse cx="118" cy="149" rx="6" ry="2.5" fill="#FF8C00"/>

  <!-- Left arm (relaxed) -->
  <g filter="url(#c-shadow)">
    <path d="M52 100 Q38 105 32 116" fill="none" stroke="#A0B0C4" stroke-width="7" stroke-linecap="round"/>
    <circle cx="30" cy="118" r="5.5" fill="#FF8C00"/>
  </g>

  <!-- Right arm (pointing forward) -->
  <g filter="url(#c-shadow)">
    <path d="M148 95 Q164 82 172 68" fill="none" stroke="#A0B0C4" stroke-width="7" stroke-linecap="round"/>
    <circle cx="174" cy="66" r="5.5" fill="#FF8C00"/>
  </g>

  <!-- Body sphere -->
  <g filter="url(#c-shadow)">
    <circle cx="100" cy="104" r="46" fill="url(#c-body)" stroke="#B0BAC8" stroke-width="1.2"/>
  </g>

  <!-- Body accent lines -->
  <path d="M58 115 Q100 138 142 115" fill="none" stroke="#00BCD4" stroke-width="1.2" opacity="0.5"/>
  <path d="M65 125 Q100 142 135 125" fill="none" stroke="#00BCD4" stroke-width="0.8" opacity="0.3"/>

  <!-- Antenna stem -->
  <line x1="100" y1="58" x2="100" y2="38" stroke="#8899AA" stroke-width="3" stroke-linecap="round"/>
  <!-- Antenna ball -->
  <circle cx="100" cy="34" r="6" fill="#FF8C00"/>
  <circle cx="98" cy="32" r="2" fill="#FFD54F" opacity="0.6"/>

  <!-- Visor -->
  <rect x="68" y="82" width="64" height="36" rx="18" fill="url(#c-visor)"/>
  <rect x="70" y="84" width="60" height="32" rx="16" fill="none" stroke="#3A5068" stroke-width="0.6" opacity="0.4"/>

  <!-- Eyes (looking right — toward click target) -->
  <g filter="url(#c-glow)">
    <rect x="80" y="92" width="10" height="14" rx="3.5" fill="#00E5FF"/>
    <rect x="100" y="90" width="10" height="16" rx="3.5" fill="#00E5FF"/>
  </g>
  <!-- Eye highlights -->
  <rect x="82" y="94" width="4" height="5" rx="2" fill="#fff" opacity="0.35"/>
  <rect x="102" y="92" width="4" height="5" rx="2" fill="#fff" opacity="0.35"/>

  <!-- Cursor icon (click indicator) -->
  <g transform="translate(158,40) scale(1.3)">
    <path d="M0 0 L0 18 L5 13.5 L9 22 L12.5 20.5 L8.5 12 L14.5 12 Z" 
          fill="#333" stroke="#FFF" stroke-width="1.2" stroke-linejoin="round"/>
  </g>

  <!-- Click ripple rings -->
  <circle cx="165" cy="48" r="18" fill="none" stroke="#00BCD4" stroke-width="1.2" opacity="0.3"/>
  <circle cx="165" cy="48" r="26" fill="none" stroke="#00BCD4" stroke-width="0.8" opacity="0.15"/>

  <!-- Step number badge -->
  <circle cx="28" cy="28" r="16" fill="#333"/>
  <text x="28" y="34" text-anchor="middle" fill="#FFF" font-family="system-ui,sans-serif" font-size="18" font-weight="700">1</text>
</svg>
